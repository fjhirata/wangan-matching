name: monthly-data-refresh
on:
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Rebuild data
        run: |
          rm -f data/raw/transactions.csv data/raw/spec_master.xlsx
          python3 tools/build_mansions_from_db.py
      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain docs/data/mansions.json)" ]; then
            git config user.name "github-actions"
            git config user.email "actions@github.com"
            git add docs/data/mansions.json
            git commit -m "chore: monthly data refresh (auto)"
            git push
          fi
